<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roller Splash - Stardust Premium Light Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f1f2f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow: hidden;
            /* Safe area spacing for mobile cameras / notches */
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- STARDUST SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.4s ease;
        }
        .splash-logo {
            font-size: 3rem;
            font-weight: 900;
            color: #ff4757;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }
        .start-app-btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(46,213,115,0.3);
        }

        /* --- SCREENS --- */
        #menu-screen, #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            position: absolute;
            transition: opacity 0.3s ease;
            opacity: 0; pointer-events: none;
        }
        #menu-screen { opacity: 1; pointer-events: auto; justify-content: center; }
        
        h1 {
            font-size: 2.8rem;
            color: #2f3542;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
        }
        .btn {
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 40px;
            cursor: pointer;
            width: 80%;
            margin: 12px 0;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .btn-easy { background: #2ed573; }
        .btn-medium { background: #ffa502; }
        .btn-hard { background: #ff4757; }

        /* --- FULL SCREEN GAME PLAY LAYOUT --- */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 92%;
            margin-bottom: 10px;
            z-index: 10;
        }
        .control-circle-btn {
            background: #ffffff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }
        .control-circle-btn svg { width: 22px; height: 22px; fill: #2f3542; }
        
        #level-header { font-size: 1.4rem; font-weight: 900; color: #2f3542; }

        /* Full Screen Canvas Container stretched up to bottom controls */
        #canvas-container {
            width: 100vw;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f2f6;
        }
        canvas {
            background: #e4e7eb;
            display: block;
        }
        
        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 92%;
            padding: 15px 0;
            z-index: 10;
        }
        .back-btn {
            background: #ffffff;
            color: #2f3542;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .hint-btn {
            background: #ffa502;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(255, 165, 2, 0.3);
        }
        .hint-btn svg { width: 24px; height: 24px; fill: #ffffff; }

        #popup-msg {
            position: fixed;
            top: 40%;
            font-size: 3rem;
            font-weight: 900;
            color: #2ed573;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transform: scale(0);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 99;
        }
        #popup-msg.show { transform: scale(1); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">ROLLER SPLASH</div>
        <button class="start-app-btn" onclick="dismissSplash()">START</button>
    </div>

    <div id="menu-screen">
        <h1>ROLLER SPLASH</h1>
        <button class="btn btn-easy" onclick="selectDifficulty('EASY')">EASY MODE</button>
        <button class="btn btn-medium" onclick="selectDifficulty('MEDIUM')">MEDIUM MODE</button>
        <button class="btn btn-hard" onclick="selectDifficulty('HARD')">HARD MODE</button>
    </div>

    <div id="game-screen">
        <div class="top-row">
            <button class="control-circle-btn" onclick="backToMenu()">
                <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
            </button>
            <div id="level-header">Level <span id="level-num">1</span></div>
            <button class="control-circle-btn" onclick="refreshCurrentLevel()">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="bottom-controls">
            <button class="back-btn" onclick="backToMenu()">Menu</button>
            <button class="hint-btn" onclick="triggerHintArrow()">
                <svg viewBox="0 0 24 24"><path d="M12 2C7.58 2 4 5.58 4 10c0 2.66 1.29 5.02 3.28 6.5v2c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2c1.99-1.48 3.28-3.84 3.28-6.5 0-4.42-3.58-8-8-8zm1 14h-2v-1h2v1z"/></svg>
            </button>
        </div>
    </div>

    <div id="popup-msg">EXCELLENT!</div>

    <script>
        function dismissSplash() {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 400);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentDifficulty = 'EASY';
        let currentLevel = 1;
        let grid = [];
        let rows = 0, cols = 0, tileSize = 0;
        
        // Premium Light Mode Paint Colors
        const paintColorsPool = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6'];
        let currentPaintColor = '#ff4757';
        
        // Clean Real Light Game Theme Styling
        const wallColor = '#dcdde1'; 
        const unpaintedPathColor = '#ffffff'; 
        
        let ball = { x: 1, y: 1, renderX: 1, renderY: 1, isMoving: false, targetX: 1, targetY: 1 };
        let activeHintDir = null;
        let touchStartX = 0, touchStartY = 0;

        function selectDifficulty(difficulty) {
            currentDifficulty = difficulty;
            currentLevel = 1;
            loadActiveGameScreen();
        }

        function loadActiveGameScreen() {
            pickRandomColor();
            document.getElementById('menu-screen').style.opacity = '0';
            document.getElementById('menu-screen').style.pointerEvents = 'none';
            document.getElementById('game-screen').style.opacity = '1';
            document.getElementById('game-screen').style.pointerEvents = 'auto';
            generateValidMaze();
        }

        function backToMenu() {
            document.getElementById('menu-screen').style.opacity = '1';
            document.getElementById('menu-screen').style.pointerEvents = 'auto';
            document.getElementById('game-screen').style.opacity = '0';
            document.getElementById('game-screen').style.pointerEvents = 'none';
            activeHintDir = null;
        }

        function pickRandomColor() {
            currentPaintColor = paintColorsPool[Math.floor(Math.random() * paintColorsPool.length)];
        }

        function refreshCurrentLevel() {
            if (ball.isMoving) return;
            activeHintDir = null;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 2) grid[r][c] = 0;
                }
            }
            ball.x = 1; ball.y = 1; ball.renderX = 1; ball.renderY = 1;
            ball.targetX = 1; ball.targetY = 1;
            grid[1][1] = 2; 
            draw();
        }

        // Mathematical verification solver ensuring 100% paint coverage
        function checkSlideCoverage() {
            let visited = Array.from({length: rows}, () => new Array(cols).fill(false));
            let painted = Array.from({length: rows}, () => new Array(cols).fill(false));
            
            let queue = [{x: 1, y: 1}];
            visited[1][1] = true;
            painted[1][1] = true;

            const vectors = [[0,-1], [0,1], [-1,0], [1,0]];

            while (queue.length > 0) {
                let curr = queue.shift();
                for (let [dx, dy] of vectors) {
                    let cx = curr.x; let cy = curr.y;
                    while (cx + dx >= 0 && cx + dx < cols && cy + dy >= 0 && cy + dy < rows && grid[cy + dy][cx + dx] !== 1) {
                        cx += dx; cy += dy;
                        painted[cy][cx] = true;
                    }
                    if (!visited[cy][cx]) {
                        visited[cy][cx] = true;
                        queue.push({x: cx, y: cy});
                    }
                }
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 0 && !painted[r][c]) return false;
                }
            }
            return true;
        }

        function generateValidMaze() {
            document.getElementById('level-num').innerText = currentLevel;
            activeHintDir = null;

            // Perfectly balanced proportions
            let size = currentDifficulty === 'EASY' ? 6 : currentDifficulty === 'MEDIUM' ? 7 : 8;
            rows = size; cols = size;

            // Automatically stretch and fill container space perfectly
            const sideSize = Math.min(window.innerWidth, window.innerHeight * 0.65);
            canvas.width = sideSize;
            canvas.height = sideSize;
            tileSize = canvas.width / cols;

            let success = false;
            for (let loop = 0; loop < 1000; loop++) {
                grid = Array.from({length: rows}, () => new Array(cols).fill(0));
                
                // Solid outer block walls
                for(let r=0; r<rows; r++) {
                    for(let c=0; c<cols; c++) {
                        if(r === 0 || r === rows-1 || c === 0 || c === cols-1) grid[r][c] = 1;
                    }
                }

                // Spacious Large Open Halls Builder
                let internalBlocks = currentDifficulty === 'EASY' ? 1 : currentDifficulty === 'MEDIUM' ? 2 : 3;
                for (let b = 0; b < internalBlocks; b++) {
                    let bx = Math.floor(Math.random() * (cols - 3)) + 1;
                    let by = Math.floor(Math.random() * (rows - 3)) + 1;
                    if(bx <= 1 && by <= 1) continue; // Keep clear launch site
                    grid[by][bx] = 1;
                }

                if (checkSlideCoverage()) {
                    success = true;
                    break;
                }
            }

            ball.x = 1; ball.y = 1; ball.renderX = 1; ball.renderY = 1;
            ball.targetX = 1; ball.targetY = 1; ball.isMoving = false;
            grid[1][1] = 2;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw full layout
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 1) {
                        ctx.fillStyle = wallColor;
                        ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    } else {
                        ctx.fillStyle = (grid[r][c] === 2) ? currentPaintColor : unpaintedPathColor;
                        ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    }
                }
            }

            // Continuous trace tracking
            if (ball.isMoving) {
                let checkR = Math.round(ball.renderY);
                let checkC = Math.round(ball.renderX);
                if (checkR >= 0 && checkR < rows && checkC >= 0 && checkC < cols) {
                    if (grid[checkR][checkC] === 0) grid[checkR][checkC] = 2;
                }
            }

            // --- REAL DIRECT NAVIGATION HINT ARROW ---
            if (activeHintDir && !ball.isMoving) {
                ctx.save();
                let arrowX = ball.x * tileSize + tileSize / 2;
                let arrowY = ball.y * tileSize + tileSize / 2;
                ctx.translate(arrowX, arrowY);
                
                let angle = 0;
                if (activeHintDir.dx === 1) angle = 0;
                if (activeHintDir.dx === -1) angle = Math.PI;
                if (activeHintDir.dy === 1) angle = Math.PI / 2;
                if (activeHintDir.dy === -1) angle = -Math.PI / 2;
                
                ctx.rotate(angle);
                ctx.fillStyle = '#ffa502';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffa502';
                
                ctx.beginPath();
                ctx.moveTo(tileSize * 0.45, 0);
                ctx.lineTo(-tileSize * 0.1, -tileSize * 0.22);
                ctx.lineTo(-0.02, 0);
                ctx.lineTo(-tileSize * 0.1,  tileSize * 0.22);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            // Sharp Player Ball Rendering
            ctx.save();
            ctx.beginPath();
            ctx.arc(ball.renderX * tileSize + tileSize/2, ball.renderY * tileSize + tileSize/2, tileSize * 0.38, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 6;
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.fill();
            ctx.restore();
        }

        function moveBall(dx, dy) {
            if (ball.isMoving) return;
            activeHintDir = null; 

            let nextX = ball.x; let nextY = ball.y;
            while (nextX + dx >= 0 && nextX + dx < cols && nextY + dy >= 0 && nextY + dy < rows && grid[nextY + dy][nextX + dx] !== 1) {
                nextX += dx; nextY += dy;
            }

            if (nextX !== ball.x || nextY !== ball.y) {
                ball.isMoving = true;
                ball.targetX = nextX; ball.targetY = nextY;

                let velocity = 0.45; // Super slick instant response velocity
                function animate() {
                    let arrived = true;
                    if (ball.renderX !== ball.targetX) {
                        let diff = ball.targetX - ball.renderX;
                        if (Math.abs(diff) <= velocity) ball.renderX = ball.targetX;
                        else ball.renderX += Math.sign(diff) * velocity;
                        arrived = false;
                    }
                    if (ball.renderY !== ball.targetY) {
                        let diff = ball.targetY - ball.renderY;
                        if (Math.abs(diff) <= velocity) ball.renderY = ball.targetY;
                        else ball.renderY += Math.sign(diff) * velocity;
                        arrived = false;
                    }
                    draw();
                    if (arrived) {
                        ball.x = ball.targetX; ball.y = ball.targetY;
                        ball.isMoving = false;
                        checkWinCondition();
                    } else requestAnimationFrame(animate);
                }
                animate();
            }
        }

        // Dynamic solver hint engine
        function triggerHintArrow() {
            if (ball.isMoving) return;
            const checks = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
            
            // Prioritize clean open unpainted lanes
            for (let d of checks) {
                let targetX = ball.x + d.dx; let targetY = ball.y + d.dy;
                if (targetY >= 0 && targetY < rows && targetX >= 0 && targetX < cols) {
                    if (grid[targetY][targetX] === 0) { activeHintDir = d; draw(); return; }
                }
            }
            // Secondary rebound path
            for (let d of checks) {
                let targetX = ball.x + d.dx; let targetY = ball.y + d.dy;
                if (targetY >= 0 && targetY < rows && targetX >= 0 && targetX < cols) {
                    if (grid[targetY][targetX] === 2) { activeHintDir = d; draw(); return; }
                }
            }
        }

        function checkWinCondition() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 0) return;
                }
            }
            const popup = document.getElementById('popup-msg');
            popup.classList.add('show');
            setTimeout(() => {
                popup.classList.remove('show');
                currentLevel++;
                pickRandomColor();
                generateValidMaze();
            }, 900);
        }

        function handleSwipe(diffX, diffY) {
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 25) moveBall(1, 0); else if (diffX < -25) moveBall(-1, 0);
            } else {
                if (diffY > 25) moveBall(0, 1); else if (diffY < -25) moveBall(0, -1);
            }
        }

        window.addEventListener('mousedown', e => { touchStartX = e.clientX; touchStartY = e.clientY; });
        window.addEventListener('mouseup', e => { handleSwipe(e.clientX - touchStartX, e.clientY - touchStartY); });
        window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => { handleSwipe(e.changedTouches[0].clientX - touchStartX, e.changedTouches[0].clientY - touchStartY); });
    </script>
</body>
</html>
