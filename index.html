<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roller Splash Pro - Speed Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f1f2f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow: hidden;
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.3s ease;
        }
        .splash-logo {
            font-size: 2.8rem;
            font-weight: 900;
            color: #ff4757;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }
        .start-app-btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(46,213,115,0.3);
        }

        /* --- SCREENS --- */
        #menu-screen, #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            position: absolute;
            transition: opacity 0.2s ease;
            opacity: 0; pointer-events: none;
        }
        #menu-screen { opacity: 1; pointer-events: auto; justify-content: center; }
        
        h1 {
            font-size: 2.6rem;
            color: #2f3542;
            font-weight: 900;
            margin-bottom: 40px;
        }
        .btn {
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 40px;
            cursor: pointer;
            width: 85%;
            margin: 12px 0;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .btn-easy { background: #2ed573; }
        .btn-medium { background: #ffa502; }
        .btn-hard { background: #ff4757; }

        /* --- MAXIMIZED BOARD ENVIRONMENT --- */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 95%;
            margin-bottom: 5px;
            z-index: 10;
        }
        .control-circle-btn {
            background: #ffffff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }
        .control-circle-btn svg { width: 22px; height: 22px; fill: #2f3542; }
        #level-header { font-size: 1.4rem; font-weight: 900; color: #2f3542; }

        /* Stretched container with zero excess borders */
        #canvas-container {
            width: 100vw;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f2f6;
            padding: 0;
        }
        canvas {
            background: #ffffff;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 95%;
            padding: 10px 0;
            z-index: 10;
        }
        .back-btn {
            background: #ffffff;
            color: #2f3542;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .hint-btn {
            background: #ffa502;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(255, 165, 2, 0.3);
        }
        .hint-btn svg { width: 24px; height: 24px; fill: #ffffff; }

        #popup-msg {
            position: fixed;
            top: 40%;
            font-size: 3rem;
            font-weight: 900;
            color: #2ed573;
            transform: scale(0);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 99;
        }
        #popup-msg.show { transform: scale(1); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">ROLLER SPLASH</div>
        <button class="start-app-btn" onclick="dismissSplash()">START GAME</button>
    </div>

    <div id="menu-screen">
        <h1>ROLLER SPLASH</h1>
        <button class="btn btn-easy" onclick="selectDifficulty('EASY')">EASY MODE</button>
        <button class="btn btn-medium" onclick="selectDifficulty('MEDIUM')">MEDIUM MODE</button>
        <button class="btn btn-hard" onclick="selectDifficulty('HARD')">HARD MODE</button>
    </div>

    <div id="game-screen">
        <div class="top-row">
            <button class="control-circle-btn" onclick="backToMenu()">
                <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
            </button>
            <div id="level-header">Level <span id="level-num">1</span></div>
            <button class="control-circle-btn" onclick="refreshCurrentLevel()">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="bottom-controls">
            <button class="back-btn" onclick="backToMenu()">Menu</button>
            <button class="hint-btn" onclick="triggerHintArrow()">
                <svg viewBox="0 0 24 24"><path d="M12 2C7.58 2 4 5.58 4 10c0 2.66 1.29 5.02 3.28 6.5v2c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2c1.99-1.48 3.28-3.84 3.28-6.5 0-4.42-3.58-8-8-8zm1 14h-2v-1h2v1z"/></svg>
            </button>
        </div>
    </div>

    <div id="popup-msg">EXCELLENT!</div>

    <script>
        // --- NO-NOISE PURE AUDIO SYNTHESIZER ---
        let audioCtx = null;
        let musicGain = null;
        let notesSequence = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
        let currentNoteIndex = 0;

        function initAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = audioCtx.createGain();
                musicGain.gain.setValueAtTime(0.5, audioCtx.currentTime); // High volume output
                musicGain.connect(audioCtx.destination);
                playNextMelodyNote();
            }
        }

        // Beautiful clean step-by-step music loop with no continuous flat hums
        function playNextMelodyNote() {
            if (!audioCtx || audioCtx.state === 'suspended') {
                setTimeout(playNextMelodyNote, 400);
                return;
            }
            let now = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            let noteGain = audioCtx.createGain();

            osc.type = 'sine'; // Super clear sine wave
            osc.frequency.setValueAtTime(notesSequence[currentNoteIndex], now);
            
            noteGain.gain.setValueAtTime(0.12, now);
            noteGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

            osc.connect(noteGain);
            noteGain.connect(musicGain);
            
            osc.start(now);
            osc.stop(now + 0.4);

            currentNoteIndex = (currentNoteIndex + 1) % notesSequence.length;
            setTimeout(playNextMelodyNote, 450); // Fluid timing interval
        }

        function playCleanSwipeSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let now = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.05);
            g.gain.setValueAtTime(0.25, now);
            g.gain.linearRampToValueAtTime(0.001, now + 0.05);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.06);
        }

        // Immediate tab switch mute guarantee
        document.addEventListener('visibilitychange', () => {
            if (audioCtx) {
                if (document.hidden) audioCtx.suspend();
                else audioCtx.resume();
            }
        });

        function dismissSplash() {
            initAudioEngine();
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 300);
        }

        // --- GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentDifficulty = 'EASY';
        let currentLevel = 1;
        let grid = [];
        let rows = 0, cols = 0, tileSize = 0;
        
        const paintColorsPool = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6'];
        let currentPaintColor = '#ff4757';
        
        const wallColor = '#dcdde1'; 
        const unpaintedPathColor = '#ffffff'; 
        
        let ball = { x: 1, y: 1, renderX: 1, renderY: 1, isMoving: false, targetX: 1, targetY: 1 };
        let activeHintDir = null;
        let isTouchActive = false;
        let touchStartX = 0, touchStartY = 0;
        let pulseTimer = 0;

        function selectDifficulty(difficulty) {
            currentDifficulty = difficulty;
            currentLevel = 1;
            loadActiveGameScreen();
        }

        function loadActiveGameScreen() {
            pickRandomColor();
            document.getElementById('menu-screen').style.opacity = '0';
            document.getElementById('menu-screen').style.pointerEvents = 'none';
            document.getElementById('game-screen').style.opacity = '1';
            document.getElementById('game-screen').style.pointerEvents = 'auto';
            generateValidMaze();
            renderLoop();
        }

        function backToMenu() {
            document.getElementById('menu-screen').style.opacity = '1';
            document.getElementById('menu-screen').style.pointerEvents = 'auto';
            document.getElementById('game-screen').style.opacity = '0';
            document.getElementById('game-screen').style.pointerEvents = 'none';
            activeHintDir = null;
        }

        function pickRandomColor() {
            currentPaintColor = paintColorsPool[Math.floor(Math.random() * paintColorsPool.length)];
        }

        function refreshCurrentLevel() {
            if (ball.isMoving) return;
            activeHintDir = null;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 2) grid[r][c] = 0;
                }
            }
            ball.x = 1; ball.y = 1; ball.renderX = 1; ball.renderY = 1;
            ball.targetX = 1; ball.targetY = 1;
            grid[1][1] = 2; 
        }

        function checkSlideCoverage() {
            let visited = Array.from({length: rows}, () => new Array(cols).fill(false));
            let painted = Array.from({length: rows}, () => new Array(cols).fill(false));
            let queue = [{x: 1, y: 1}];
            visited[1][1] = true;
            painted[1][1] = true;
            const vectors = [[0,-1], [0,1], [-1,0], [1,0]];

            while (queue.length > 0) {
                let curr = queue.shift();
                for (let [dx, dy] of vectors) {
                    let cx = curr.x; let cy = curr.y;
                    while (cx + dx >= 0 && cx + dx < cols && cy + dy >= 0 && cy + dy < rows && grid[cy + dy][cx + dx] !== 1) {
                        cx += dx; cy += dy;
                        painted[cy][cx] = true;
                    }
                    if (!visited[cy][cx]) {
                        visited[cy][cx] = true;
                        queue.push({x: cx, y: cy});
                    }
                }
            }
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 0 && !painted[r][c]) return false;
                }
            }
            return true;
        }

        function generateValidMaze() {
            document.getElementById('level-num').innerText = currentLevel;
            activeHintDir = null;

            let size = currentDifficulty === 'EASY' ? 6 : currentDifficulty === 'MEDIUM' ? 7 : 8;
            rows = size; cols = size;

            // Maximized full board layout expansion
            const sideSize = Math.min(window.innerWidth * 0.98, window.innerHeight * 0.72);
            canvas.width = sideSize;
            canvas.height = sideSize;
            tileSize = canvas.width / cols;

            let success = false;
            for (let loop = 0; loop < 1000; loop++) {
                grid = Array.from({length: rows}, () => new Array(cols).fill(0));
                for(let r=0; r<rows; r++) {
                    for(let c=0; c<cols; c++) {
                        if(r === 0 || r === rows-1 || c === 0 || c === cols-1) grid[r][c] = 1;
                    }
                }
                let internalBlocks = currentDifficulty === 'EASY' ? 1 : currentDifficulty === 'MEDIUM' ? 2 : 3;
                for (let b = 0; b < internalBlocks; b++) {
                    let bx = Math.floor(Math.random() * (cols - 3)) + 1;
                    let by = Math.floor(Math.random() * (rows - 3)) + 1;
                    if(bx <= 1 && by <= 1) continue;
                    grid[by][bx] = 1;
                }
                if (checkSlideCoverage()) {
                    success = true;
                    break;
                }
            }
            ball.x = 1; ball.y = 1; ball.renderX = 1; ball.renderY = 1;
            ball.targetX = 1; ball.targetY = 1; ball.isMoving = false;
            grid[1][1] = 2;
        }

        function renderLoop() {
            pulseTimer += 0.15;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 1) {
                        ctx.fillStyle = wallColor;
                        ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    } else {
                        ctx.fillStyle = (grid[r][c] === 2) ? currentPaintColor : unpaintedPathColor;
                        ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    }
                }
            }

            if (ball.isMoving) {
                let checkR = Math.round(ball.renderY);
                let checkC = Math.round(ball.renderX);
                if (checkR >= 0 && checkR < rows && checkC >= 0 && checkC < cols) {
                    if (grid[checkR][checkC] === 0) grid[checkR][checkC] = 2;
                }
            }

            // --- GIANT FLOATING HINT ARROW OVERLAY ---
            if (activeHintDir && !ball.isMoving) {
                ctx.save();
                let arrowX = ball.x * tileSize + tileSize / 2;
                let arrowY = ball.y * tileSize + tileSize / 2;
                ctx.translate(arrowX, arrowY);
                
                let angle = 0;
                if (activeHintDir.dx === 1) angle = 0;
                if (activeHintDir.dx === -1) angle = Math.PI;
                if (activeHintDir.dy === 1) angle = Math.PI / 2;
                if (activeHintDir.dy === -1) angle = -Math.PI / 2;
                ctx.rotate(angle);

                let bounceOffset = Math.sin(pulseTimer) * (tileSize * 0.15);
                ctx.translate(bounceOffset, 0);

                ctx.fillStyle = '#ffa502';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffa502';
                
                // Significantly expanded giant arrow dimensions
                ctx.beginPath();
                ctx.moveTo(tileSize * 0.65, 0);
                ctx.lineTo(-tileSize * 0.1, -tileSize * 0.35);
                ctx.lineTo(0, 0);
                ctx.lineTo(-tileSize * 0.1,  tileSize * 0.35);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            // Ball Paint Actor
            ctx.save();
            ctx.beginPath();
            ctx.arc(ball.renderX * tileSize + tileSize/2, ball.renderY * tileSize + tileSize/2, tileSize * 0.38, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 6;
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.fill();
            ctx.restore();

            requestAnimationFrame(renderLoop);
        }

        function moveBall(dx, dy) {
            if (ball.isMoving) return;
            activeHintDir = null; 

            let nextX = ball.x; let nextY = ball.y;
            while (nextX + dx >= 0 && nextX + dx < cols && nextY + dy >= 0 && nextY + dy < rows && grid[nextY + dy][nextX + dx] !== 1) {
                nextX += dx; nextY += dy;
            }

            if (nextX !== ball.x || nextY !== ball.y) {
                ball.isMoving = true;
                ball.targetX = nextX; ball.targetY = nextY;
                playCleanSwipeSound();

                let velocity = 0.85; // 3x ultra-fast sliding movement speed
                function animate() {
                    let arrived = true;
                    if (ball.renderX !== ball.targetX) {
                        let diff = ball.targetX - ball.renderX;
                        if (Math.abs(diff) <= velocity) ball.renderX = ball.targetX;
                        else ball.renderX += Math.sign(diff) * velocity;
                        arrived = false;
                    }
                    if (ball.renderY !== ball.targetY) {
                        let diff = ball.targetY - ball.renderY;
                        if (Math.abs(diff) <= velocity) ball.renderY = ball.targetY;
                        else ball.renderY += Math.sign(diff) * velocity;
                        arrived = false;
                    }
                    if (arrived) {
                        ball.x = ball.targetX; ball.y = ball.targetY;
                        ball.isMoving = false;
                        checkWinCondition();
                    } else requestAnimationFrame(animate);
                }
                animate();
            }
        }

        function triggerHintArrow() {
            if (ball.isMoving) return;
            const checks = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
            for (let d of checks) {
                let targetX = ball.x + d.dx; let targetY = ball.y + d.dy;
                if (targetY >= 0 && targetY < rows && targetX >= 0 && targetX < cols) {
                    if (grid[targetY][targetX] === 0) { activeHintDir = d; return; }
                }
            }
        }

        function checkWinCondition() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 0) return;
                }
            }
            const popup = document.getElementById('popup-msg');
            popup.classList.add('show');
            setTimeout(() => {
                popup.classList.remove('show');
                currentLevel++;
                pickRandomColor();
                generateValidMaze();
            }, 800);
        }

        // --- REALTIME CONTINUOUS DRAG-SWIPE LOGIC (No lifting finger required) ---
        function processRealtimeTouch(currentX, currentY) {
            if (!isTouchActive || ball.isMoving) return;
            let diffX = currentX - touchStartX;
            let diffY = currentY - touchStartY;
            let threshold = 18; // Short ultra-responsive trigger distance

            if (Math.abs(diffX) > threshold || Math.abs(diffY) > threshold) {
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 0) moveBall(1, 0); else moveBall(-1, 0);
                } else {
                    if (diffY > 0) moveBall(0, 1); else moveBall(0, -1);
                }
                // Reset origin to current point to chain moves continuously
                touchStartX = currentX;
                touchStartY = currentY;
            }
        }

        window.addEventListener('touchstart', e => { isTouchActive = true; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        window.addEventListener('touchmove', e => { processRealtimeTouch(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchend', () => { isTouchActive = false; });

        window.addEventListener('mousedown', e => { isTouchActive = true; touchStartX = e.clientX; touchStartY = e.clientY; });
        window.addEventListener('mousemove', e => { processRealtimeTouch(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => { isTouchActive = false; });
    </script>
</body>
</html>
