<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roller Splash Pro - Stardust</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- STARDUST SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0e15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.8s ease-in-out;
        }
        .splash-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffecb3, #ffd700, #ffb300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.2);
            animation: logoFade 1.8s ease-in-out infinite alternate;
        }
        .splash-sub {
            font-size: 0.9rem;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            font-weight: 700;
        }
        @keyframes logoFade {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1.02); opacity: 1; filter: drop-shadow(0 0 15px rgba(255,215,0,0.4)); }
        }

        /* --- GAME SCREENS --- */
        #menu-screen, #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            padding: 20px;
            position: absolute;
            transition: all 0.5s ease-in-out;
            opacity: 0; pointer-events: none;
        }
        #menu-screen { opacity: 1; pointer-events: auto; }
        
        h1 {
            font-size: 3.5rem;
            color: #2c3e50;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.1);
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .btn {
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 85%;
            margin: 12px 0;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-easy { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .btn-medium { background: linear-gradient(45deg, #ff9966, #ff5e62); }
        .btn-hard { background: linear-gradient(45deg, #ee0979, #ff6a00); }

        /* --- GAME LAYOUT ELEMENTS --- */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 85%;
            margin-bottom: 15px;
            position: relative;
        }
        .settings-btn {
            background: #ffffff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header-center {
            text-align: center;
            flex-grow: 1;
        }
        #level-header {
            font-size: 2rem;
            font-weight: 900;
            color: #2c3e50;
        }
        #difficulty-badge {
            display: inline-block;
            padding: 4px 15px;
            border-radius: 50px;
            color: white;
            font-size: 0.8rem;
            font-weight: 800;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        #canvas-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            position: relative;
        }
        canvas {
            display: block;
            border-radius: 16px;
            background: #ecf0f1;
        }
        
        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 85%;
            margin-top: 25px;
        }
        .back-btn {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }
        .hint-btn {
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(241, 196, 15, 0.4);
        }

        /* --- SETTINGS MODAL --- */
        #settings-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #settings-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .modal-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; color: #2c3e50;}
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .toggle-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
        }
        .toggle-btn.off { background: #e74c3c; }
        .close-modal-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 700;
        }

        #popup-msg {
            position: fixed;
            font-size: 3.5rem;
            font-weight: 900;
            color: #f1c40f;
            text-shadow: 3px 3px 0px #2c3e50;
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 10;
        }
        #popup-msg.show { transform: scale(1); }
        
        #hint-text {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #hint-text.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">STARDUST</div>
        <div class="splash-sub">Studios</div>
    </div>

    <div id="menu-screen">
        <h1>ROLLER</h1>
        <p class="subtitle">Swipe to paint the entire maze!</p>
        <button class="btn btn-easy" onclick="startGame('EASY')">EASY</button>
        <button class="btn btn-medium" onclick="startGame('MEDIUM')">MEDIUM</button>
        <button class="btn btn-hard" onclick="startGame('HARD')">HARD</button>
    </div>

    <div id="game-screen">
        <div class="top-row">
            <button class="settings-btn" onclick="toggleSettingsModal(true)">⚙️</button>
            <div class="header-center">
                <div id="level-header">Level <span id="level-num">1</span></div>
                <div id="difficulty-badge">EASY</div>
            </div>
            <div style="width:45px;"></div> </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div id="hint-text">Bot: Try moving Up!</div>
        </div>
        <div class="bottom-controls">
            <button class="back-btn" onclick="backToMenu()">Menu</button>
            <button class="hint-btn" onclick="giveHint()">💡</button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <div class="modal-title">Settings</div>
            <div class="setting-row">
                <span>Sound Effects</span>
                <button id="sound-toggle" class="toggle-btn" onclick="toggleSound()">ON</button>
            </div>
            <button class="close-modal-btn" onclick="toggleSettingsModal(false)">Close</button>
        </div>
    </div>

    <div id="popup-msg">GOOD!</div>

    <script>
        // Splash Screen Logic (Auto-disappears after 2.5 seconds)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 2500);
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentDifficulty = 'EASY';
        let currentLevel = 1;
        let grid = [];
        let rows = 0, cols = 0, tileSize = 0;
        let soundEnabled = true;
        let currentPaintColor = '#38ef7d'; // Default initial color
        
        let ball = { x: 1, y: 1, renderX: 1, renderY: 1, isMoving: false, targetX: 1, targetY: 1 };
        
        const winMessages = ["GOOD!", "GREAT!", "UNSTOPPABLE!", "AWESOME!", "PERFECT!", "AMAZING!"];
        
        // Dynamic Variable Colors array (Levels badhne par ye list se colors change honge)
        const paintColorsPool = ['#38ef7d', '#ff5e62', '#ee0979', '#f1c40f', '#2ecc71', '#9b59b6', '#00d2d3', '#ff9f43'];
        const wallColor = '#2c3e50';
        const unpaintedPathColor = '#bdc3c7';

        let touchStartX = 0, touchStartY = 0;

        // --- WEB AUDIO API JUICY SOUND GENERATOR ---
        function playSwipeSound() {
            if (!soundEnabled) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'triangle'; // Smooth retro sound
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime); // Start pitch
                oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15); // Slide up pitch
                
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.18); // Fade out smoothly
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.18);
            } catch (e) { console.log("Sound error context:", e); }
        }

        // Settings Controls
        function toggleSettingsModal(show) {
            document.getElementById('settings-modal').classList.toggle('show', show);
        }
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('sound-toggle');
            btn.innerText = soundEnabled ? 'ON' : 'OFF';
            btn.className = soundEnabled ? 'toggle-btn' : 'toggle-btn off';
        }

        function startGame(difficulty) {
            currentDifficulty = difficulty;
            currentLevel = 1;
            pickRandomColor();
            
            document.getElementById('menu-screen').style.opacity = '0';
            document.getElementById('menu-screen').style.pointerEvents = 'none';
            
            const gameScreen = document.getElementById('game-screen');
            gameScreen.style.opacity = '1';
            gameScreen.style.pointerEvents = 'auto';
            
            const badge = document.getElementById('difficulty-badge');
            badge.innerText = difficulty;
            badge.style.background = difficulty === 'EASY' ? 'linear-gradient(45deg, #11998e, #38ef7d)' : 
                                    difficulty === 'MEDIUM' ? 'linear-gradient(45deg, #ff9966, #ff5e62)' : 
                                    'linear-gradient(45deg, #ee0979, #ff6a00)';

            generateValidMaze();
        }

        function backToMenu() {
            document.getElementById('menu-screen').style.opacity = '1';
            document.getElementById('menu-screen').style.pointerEvents = 'auto';
            document.getElementById('game-screen').style.opacity = '0';
            document.getElementById('game-screen').style.pointerEvents = 'none';
        }

        function pickRandomColor() {
            // Pick a random paint color from the pool different from last time
            let index = Math.floor(Math.random() * paintColorsPool.length);
            currentPaintColor = paintColorsPool[index];
        }

        function generateValidMaze() {
            document.getElementById('level-num').innerText = currentLevel;

            let baseSize = currentDifficulty === 'EASY' ? 5 : currentDifficulty === 'MEDIUM' ? 7 : 9;
            let levelBonus = Math.min(Math.floor(currentLevel / 4), 3); 
            
            rows = baseSize + levelBonus;
            cols = baseSize + levelBonus;
            if (rows % 2 === 0) { rows++; cols++; }

            const maxCanvasWidth = Math.min(window.innerWidth - 50, 400);
            tileSize = Math.floor(maxCanvasWidth / cols);
            canvas.width = cols * tileSize;
            canvas.height = rows * tileSize;

            grid = Array.from({length: rows}, () => new Array(cols).fill(1));

            function dfs(r, c) {
                grid[r][c] = 0;
                const directions = [[-2, 0], [2, 0], [0, -2], [0, 2]].sort(() => Math.random() - 0.5);
                for (let [dr, dc] of directions) {
                    let nr = r + dr, nc = c + dc;
                    if (nr > 0 && nr < rows - 1 && nc > 0 && nc < cols - 1 && grid[nr][nc] === 1) {
                        grid[r + dr/2][c + dc/2] = 0;
                        dfs(nr, nc);
                    }
                }
            }
            dfs(1, 1);

            ball.x = 1; ball.y = 1;
            ball.renderX = 1; ball.renderY = 1;
            ball.targetX = 1; ball.targetY = 1;
            ball.isMoving = false;
            grid[1][1] = 2; 

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 1) {
                        ctx.fillStyle = wallColor;
                    } else if (grid[r][c] === 2) {
                        ctx.fillStyle = currentPaintColor;
                    } else {
                        ctx.fillStyle = unpaintedPathColor;
                    }
                    ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                }
            }

            if (ball.isMoving) {
                let currC = Math.round(ball.renderX);
                let currR = Math.round(ball.renderY);
                if (grid[currR][currC] === 0) {
                    grid[currR][currC] = 2;
                }
            }

            // Draw Ball
            ctx.beginPath();
            ctx.arc(ball.renderX * tileSize + tileSize/2, ball.renderY * tileSize + tileSize/2, tileSize * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.closePath();
        }

        function moveBall(dx, dy) {
            if (ball.isMoving) return;

            let nextX = ball.x;
            let nextY = ball.y;

            while (true) {
                let checkX = nextX + dx;
                let checkY = nextY + dy;
                if (checkY >= 0 && checkY < rows && checkX >= 0 && checkX < cols && grid[checkY][checkX] !== 1) {
                    nextX = checkX;
                    nextY = checkY;
                } else {
                    break;
                }
            }

            if (nextX !== ball.x || nextY !== ball.y) {
                ball.isMoving = true;
                ball.targetX = nextX;
                ball.targetY = nextY;
                
                playSwipeSound(); // Trigger premium swipe bounce audio asset code

                let speed = 0.25; 
                function animate() {
                    let moveDone = true;
                    
                    if (ball.renderX !== ball.targetX) {
                        let diff = ball.targetX - ball.renderX;
                        if (Math.abs(diff) <= speed) ball.renderX = ball.targetX;
                        else ball.renderX += Math.sign(diff) * speed;
                        moveDone = false;
                    }
                    if (ball.renderY !== ball.targetY) {
                        let diff = ball.targetY - ball.renderY;
                        if (Math.abs(diff) <= speed) ball.renderY = ball.targetY;
                        else ball.renderY += Math.sign(diff) * speed;
                        moveDone = false;
                    }

                    draw();

                    if (moveDone) {
                        ball.x = ball.targetX;
                        ball.y = ball.targetY;
                        ball.isMoving = false;
                        checkWinCondition();
                    } else {
                        requestAnimationFrame(animate);
                    }
                }
                animate();
            }
        }

        function giveHint() {
            if (ball.isMoving) return;
            const directions = [
                { name: 'Up', dx: 0, dy: -1 },
                { name: 'Down', dx: 0, dy: 1 },
                { name: 'Left', dx: -1, dy: 0 },
                { name: 'Right', dx: 1, dy: 0 }
            ];

            for (let d of directions) {
                let tx = ball.x + d.dx;
                let ty = ball.y + d.dy;
                if (ty >= 0 && ty < rows && tx >= 0 && tx < cols && grid[ty][tx] === 0) {
                    showHintPopup(`Bot: Swipe ${d.name}!`);
                    return;
                }
            }
            for (let d of directions) {
                let tx = ball.x + d.dx;
                let ty = ball.y + d.dy;
                if (ty >= 0 && ty < rows && tx >= 0 && tx < cols && grid[ty][tx] !== 1) {
                    showHintPopup(`Bot: Try moving ${d.name}!`);
                    return;
                }
            }
        }

        function showHintPopup(msg) {
            const el = document.getElementById('hint-text');
            el.innerText = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        function checkWinCondition() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 0) return; 
                }
            }
            showWinPopup();
        }

        function showWinPopup() {
            const popup = document.getElementById('popup-msg');
            popup.innerText = winMessages[Math.floor(Math.random() * winMessages.length)];
            popup.classList.add('show');

            setTimeout(() => {
                popup.classList.remove('show');
                currentLevel++;
                pickRandomColor(); // New level means new random paint color!
                generateValidMaze();
            }, 1000);
        }

        function handleSwipe(diffX, diffY) {
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30) moveBall(1, 0);
                else if (diffX < -30) moveBall(-1, 0);
            } else {
                if (diffY > 30) moveBall(0, 1);
                else if (diffY < -30) moveBall(0, -1);
            }
        }

        window.addEventListener('mousedown', e => { touchStartX = e.clientX; touchStartY = e.clientY; });
        window.addEventListener('mouseup', e => { handleSwipe(e.clientX - touchStartX, e.clientY - touchStartY); });
        window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => { handleSwipe(e.changedTouches[0].clientX - touchStartX, e.changedTouches[0].clientY - touchStartY); });

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') moveBall(0, -1);
            if (e.key === 'ArrowDown' || e.key === 's') moveBall(0, 1);
            if (e.key === 'ArrowLeft' || e.key === 'a') moveBall(-1, 0);
            if (e.key === 'ArrowRight' || e.key === 'd') moveBall(1, 0);
        });
    </script>
</body>
</html>
