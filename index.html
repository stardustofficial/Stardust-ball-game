<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roller Splash Pro - Stardust Master Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- STARDUST SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0e15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.5s ease-in-out;
            padding: 20px;
        }
        .splash-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 10vw;
            max-font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffecb3, #ffd700, #ffb300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
            text-align: center;
            margin-bottom: 5px;
        }
        .splash-sub {
            font-size: 4.5vw;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 40px;
            font-weight: 700;
            text-align: center;
        }
        .start-app-btn {
            background: linear-gradient(45deg, #ffd700, #ff9f43);
            color: #0d0e15;
            border: none;
            padding: 16px 50px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255,215,0,0.4);
            letter-spacing: 2px;
            transition: transform 0.1s ease;
        }
        .start-app-btn:active { transform: scale(0.95); }

        /* --- SCREENS MANAGEMENT --- */
        #menu-screen, #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            padding: 20px;
            position: absolute;
            transition: all 0.4s ease-in-out;
            opacity: 0; pointer-events: none;
        }
        #menu-screen { opacity: 1; pointer-events: auto; }
        
        h1 {
            font-size: 12vw;
            color: #2c3e50;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 4vw;
            font-weight: 500;
            text-align: center;
        }
        .btn {
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 85%;
            margin: 12px 0;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .btn:active { transform: scale(0.95); }
        .btn-easy { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .btn-medium { background: linear-gradient(45deg, #ff9966, #ff5e62); }
        .btn-hard { background: linear-gradient(45deg, #ee0979, #ff6a00); }

        /* --- TOP ROW CONTROLS WITH VECTOR SVGS --- */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin-bottom: 15px;
        }
        .control-circle-btn {
            background: #ffffff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s ease;
        }
        .control-circle-btn:active { transform: scale(0.9); }
        .control-circle-btn svg {
            width: 22px;
            height: 22px;
            fill: #2c3e50;
        }
        
        #level-header {
            font-size: 1.6rem;
            font-weight: 900;
            color: #2c3e50;
        }
        #difficulty-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 50px;
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            margin-top: 2px;
            text-transform: uppercase;
        }
        #canvas-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }
        canvas {
            display: block;
            border-radius: 16px;
            background: #ecf0f1;
        }
        
        /* --- BOTTOM CONTROLS --- */
        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin-top: 25px;
        }
        .back-btn {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }
        .hint-btn {
            background: #f1c40f;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(241, 196, 15, 0.4);
            transition: transform 0.1s ease;
        }
        .hint-btn:active { transform: scale(0.9); }
        .hint-btn svg {
            width: 26px;
            height: 26px;
            fill: #2c3e50;
        }

        /* --- MODAL DIALOGS --- */
        #settings-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #settings-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 350px;
            text-align: center;
        }
        .modal-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; color: #2c3e50;}
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            font-weight: 700;
        }
        .toggle-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
        }
        .toggle-btn.off { background: #e74c3c; }
        .close-modal-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 700;
        }

        #popup-msg {
            position: fixed;
            width: 90%;
            text-align: center;
            font-size: 7.5vw;
            font-weight: 900;
            color: #f1c40f;
            text-shadow: 2px 2px 0px #2c3e50;
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 10;
        }
        #popup-msg.show { transform: scale(1); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">STARDUST</div>
        <div class="splash-sub">Studios</div>
        <button class="start-app-btn" onclick="dismissSplashAndPlay()">START GAME</button>
    </div>

    <div id="menu-screen">
        <h1>ROLLER</h1>
        <p class="subtitle">Swipe to paint the entire maze!</p>
        <button class="btn btn-easy" onclick="selectDifficulty('EASY')">EASY</button>
        <button class="btn btn-medium" onclick="selectDifficulty('MEDIUM')">MEDIUM</button>
        <button class="btn btn-hard" onclick="selectDifficulty('HARD')">HARD</button>
    </div>

    <div id="game-screen">
        <div class="top-row">
            <button class="control-circle-btn" onclick="toggleSettingsModal(true)">
                <svg viewBox="0 0 24 24">
                    <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/>
                </svg>
            </button>
            <div style="text-align: center; flex-grow: 1;">
                <div id="level-header">Level <span id="level-num">1</span></div>
                <div id="difficulty-badge">EASY</div>
            </div>
            <button class="control-circle-btn" onclick="refreshCurrentLevel()" title="Reset Level">
                <svg viewBox="0 0 24 24">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </button>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="bottom-controls">
            <button class="back-btn" onclick="backToMenu()">Menu</button>
            <button class="hint-btn" onclick="triggerHintArrow()">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C7.58 2 4 5.58 4 10c0 2.66 1.29 5.02 3.28 6.5l.02.02c.4.3.7.7.7 1.18V19c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-1.3c0-.48.3-.88.7-1.18l.02-.02C18.71 15.02 20 12.66 20 10c0-4.42-3.58-8-8-8zm1 16h-2v-1h2v1zm0-2.5h-2c0-1.5-1.5-1.5-1.5-3 0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5c0 1.5-1.5 1.5-1.5 3z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <div class="modal-title">Settings</div>
            <div class="setting-row">
                <span>Sound FX</span>
                <button id="sound-toggle" class="toggle-btn" onclick="toggleSound()">ON</button>
            </div>
            <div class="setting-row">
                <span>Music</span>
                <button id="music-toggle" class="toggle-btn" onclick="toggleMusic()">ON</button>
            </div>
            <button class="close-modal-btn" onclick="toggleSettingsModal(false)">Close</button>
        </div>
    </div>

    <div id="popup-msg">GOOD!</div>

    <script>
        // --- STARDUST AUDIO ARCHITECTURE ---
        let audioCtx = null;
        let soundEnabled = true;
        let musicEnabled = true;
        let bgOscillator = null;
        let bgGainNode = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playStardustIntroMusic() {
            initAudio();
            if (!soundEnabled) return;
            let now = audioCtx.currentTime;
            let introNotes = [261.63, 329.63, 392.00, 523.25];
            
            introNotes.forEach((f) => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(f, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.12, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.6);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 1.8);
            });
        }

        function startAmbientBackgroundMusic() {
            initAudio();
            if (!musicEnabled || bgOscillator) return;

            let now = audioCtx.currentTime;
            bgOscillator = audioCtx.createOscillator();
            bgGainNode = audioCtx.createGain();
            
            bgOscillator.type = 'sine';
            bgOscillator.frequency.setValueAtTime(220.00, now); 
            bgGainNode.gain.setValueAtTime(0.06, now); 
            
            bgOscillator.connect(bgGainNode);
            bgGainNode.connect(audioCtx.destination);
            bgOscillator.start(now);
        }

        function stopAmbientMusic() {
            if (bgOscillator) {
                try { bgOscillator.stop(); } catch(e){}
                bgOscillator = null;
                bgGainNode = null;
            }
        }

        function playLoudSwipeSound() {
            if (!soundEnabled) return;
            initAudio();
            let now = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(490, now);
            osc.frequency.exponentialRampToValueAtTime(180, now + 0.08);
            gain.gain.setValueAtTime(0.35, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.11);
        }

        function dismissSplashAndPlay() {
            initAudio();
            playStardustIntroMusic();
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                startAmbientBackgroundMusic(); 
                checkSavedGameStatus();
            }, 500);
        }

        // --- MASTER CORE ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentDifficulty = 'EASY';
        let currentLevel = 1;
        let grid = [];
        let rows = 0, cols = 0, tileSize = 0;
        let currentPaintColor = '#38ef7d';
        let activeHintDir = null; 
        
        let ball = { x: 1, y: 1, renderX: 1, renderY: 1, isMoving: false, targetX: 1, targetY: 1 };
        const winMessages = ["GOOD!", "GREAT!", "UNSTOPPABLE!", "AWESOME!", "PERFECT!"];
        const paintColorsPool = ['#38ef7d', '#ff5e62', '#ee0979', '#f1c40f', '#2ecc71', '#9b59b6', '#00d2d3', '#ff9f43'];
        const wallColor = '#2c3e50';
        const unpaintedPathColor = '#bdc3c7';
        let touchStartX = 0, touchStartY = 0;

        function toggleSettingsModal(show) {
            document.getElementById('settings-modal').classList.toggle('show', show);
        }
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-toggle').innerText = soundEnabled ? 'ON' : 'OFF';
            document.getElementById('sound-toggle').className = soundEnabled ? 'toggle-btn' : 'toggle-btn off';
        }
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            document.getElementById('music-toggle').innerText = musicEnabled ? 'ON' : 'OFF';
            document.getElementById('music-toggle').className = musicEnabled ? 'toggle-btn' : 'toggle-btn off';
            if (musicEnabled) startAmbientBackgroundMusic();
            else stopAmbientMusic();
        }

        function checkSavedGameStatus() {
            const savedLevel = localStorage.getItem('stardust_lvl');
            const savedDiff = localStorage.getItem('stardust_diff');
            if (savedLevel && savedDiff) {
                currentLevel = parseInt(savedLevel);
                currentDifficulty = savedDiff;
                loadActiveGameScreen();
            }
        }

        function selectDifficulty(difficulty) {
            currentDifficulty = difficulty;
            currentLevel = 1;
            localStorage.setItem('stardust_lvl', currentLevel);
            localStorage.setItem('stardust_diff', currentDifficulty);
            loadActiveGameScreen();
        }

        function loadActiveGameScreen() {
            pickRandomColor();
            document.getElementById('menu-screen').style.opacity = '0';
            document.getElementById('menu-screen').style.pointerEvents = 'none';
            document.getElementById('game-screen').style.opacity = '1';
            document.getElementById('game-screen').style.pointerEvents = 'auto';
            
            const badge = document.getElementById('difficulty-badge');
            badge.innerText = currentDifficulty;
            badge.style.background = currentDifficulty === 'EASY' ? 'linear-gradient(45deg, #11998e, #38ef7d)' : 
                                    currentDifficulty === 'MEDIUM' ? 'linear-gradient(45deg, #ff9966, #ff5e62)' : 
                                    'linear-gradient(45deg, #ee0979, #ff6a00)';

            generateValidMaze();
        }

        function backToMenu() {
            document.getElementById('menu-screen').style.opacity = '1';
            document.getElementById('menu-screen').style.pointerEvents = 'auto';
            document.getElementById('game-screen').style.opacity = '0';
            document.getElementById('game-screen').style.pointerEvents = 'none';
            activeHintDir = null;
        }

        function pickRandomColor() {
            currentPaintColor = paintColorsPool[Math.floor(Math.random() * paintColorsPool.length)];
        }

        function refreshCurrentLevel() {
            if (ball.isMoving) return;
            activeHintDir = null;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 2) grid[r][c] = 0;
                }
            }
            ball.x = 1; ball.y = 1; ball.renderX = 1; ball.renderY = 1;
            ball.targetX = 1; ball.targetY = 1;
            grid[1][1] = 2; 
            draw();
        }

        // --- VALIDATION ENGINE (Evaluates Full Physics Paintability) ---
        function checkSlideCoverage() {
            let visitedPoints = Array.from({length: rows}, () => new Array(cols).fill(false));
            let paintedTracker = Array.from({length: rows}, () => new Array(cols).fill(false));
            
            let queue = [{x: 1, y: 1}];
            visitedPoints[1][1] = true;
            paintedTracker[1][1] = true;

            const vectors = [[0,-1], [0,1], [-1,0], [1,0]];

            while (queue.length > 0) {
                let curr = queue.shift();

                for (let [dx, dy] of vectors) {
                    let cx = curr.x;
                    let cy = curr.y;

                    while (cx + dx >= 0 && cx + dx < cols && cy + dy >= 0 && cy + dy < rows && grid[cy + dy][cx + dx] !== 1) {
                        cx += dx;
                        cy += dy;
                        paintedTracker[cy][cx] = true;
                    }

                    if (!visitedPoints[cy][cx]) {
                        visitedPoints[cy][cx] = true;
                        queue.push({x: cx, y: cy});
                    }
                }
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 0 && !paintedTracker[r][c]) {
                        return false; 
                    }
                }
            }
            return true;
        }

        function generateValidMaze() {
            document.getElementById('level-num').innerText = currentLevel;
            activeHintDir = null;

            let size = currentDifficulty === 'EASY' ? 7 : currentDifficulty === 'MEDIUM' ? 9 : 11;
            rows = size; cols = size;

            const maxCanvasWidth = Math.min(window.innerWidth - 60, 360);
            tileSize = Math.floor(maxCanvasWidth / cols);
            canvas.width = cols * tileSize; canvas.height = rows * tileSize;

            let stable = false;
            for (let loop = 0; loop < 2000; loop++) {
                grid = Array.from({length: rows}, () => new Array(cols).fill(1));
                
                let stack = [{r: 1, c: 1}];
                grid[1][1] = 0;

                while(stack.length > 0) {
                    let curr = stack[stack.length - 1];
                    let neighbors = [];
                    const dirs = [[-2,0],[2,0],[0,-2],[0,2]];
                    
                    for(let [dr, dc] of dirs) {
                        let nr = curr.r + dr; let nc = curr.c + dc;
                        if(nr > 0 && nr < rows-1 && nc > 0 && nc < cols-1 && grid[nr][nc] === 1) {
                            neighbors.push({r: nr, c: nc, dr: dr, dc: dc});
                        }
                    }

                    if(neighbors.length > 0) {
                        let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                        grid[curr.r + next.dr/2][curr.c + next.dc/2] = 0;
                        grid[next.r][next.c] = 0;
                        stack.push({r: next.r, c: next.c});
                    } else {
                        stack.pop();
                    }
                }

                for (let i = 0; i < (size === 7 ? 2 : size === 9 ? 4 : 6); i++) {
                    let rx = Math.floor(Math.random() * (cols - 2)) + 1;
                    let ry = Math.floor(Math.random() * (rows - 2)) + 1;
                    if ((rx !== 1 || ry !== 1) && grid[ry][rx] === 0) {
                        grid[ry][rx] = 1;
                    }
                }

                if (checkSlideCoverage()) {
                    stable = true;
                    break;
                }
            }

            ball.x = 1; ball.y = 1; ball.renderX = 1; ball.renderY = 1;
            ball.targetX = 1; ball.targetY = 1; ball.isMoving = false;
            grid[1][1] = 2;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 1) ctx.fillStyle = wallColor;
                    else if (grid[r][c] === 2) ctx.fillStyle = currentPaintColor;
                    else ctx.fillStyle = unpaintedPathColor;
                    ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                }
            }

            if (ball.isMoving) {
                let checkR = Math.round(ball.renderY);
                let checkC = Math.round(ball.renderX);
                if (grid[checkR][checkC] === 0) grid[checkR][checkC] = 2;
            }

            // --- CANVAS INTEGRATED GLOWING HINT SYSTEM ---
            if (activeHintDir && !ball.isMoving) {
                ctx.save();
                let exactBallX = ball.x * tileSize + tileSize / 2;
                let exactBallY = ball.y * tileSize + tileSize / 2;
                ctx.translate(exactBallX, exactBallY);
                
                let angle = 0;
                if (activeHintDir.dx === 1) angle = 0;
                if (activeHintDir.dx === -1) angle = Math.PI;
                if (activeHintDir.dy === 1) angle = Math.PI / 2;
                if (activeHintDir.dy === -1) angle = -Math.PI / 2;
                
                ctx.rotate(angle);
                ctx.fillStyle = '#f1c40f';
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#f1c40f';
                
                ctx.beginPath();
                ctx.moveTo(tileSize * 0.4, 0);
                ctx.lineTo(-tileSize * 0.15, -tileSize * 0.25);
                ctx.lineTo(-0.04, 0);
                ctx.lineTo(-tileSize * 0.15,  tileSize * 0.25);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(ball.renderX * tileSize + tileSize/2, ball.renderY * tileSize + tileSize/2, tileSize * 0.36, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 0; 
            ctx.fill();
        }

        function moveBall(dx, dy) {
            if (ball.isMoving) return;
            activeHintDir = null; 

            let nextX = ball.x; let nextY = ball.y;
            while (nextX + dx >= 0 && nextX + dx < cols && nextY + dy >= 0 && nextY + dy < rows && grid[nextY + dy][nextX + dx] !== 1) {
                nextX += dx;
                nextY += dy;
            }

            if (nextX !== ball.x || nextY !== ball.y) {
                ball.isMoving = true;
                ball.targetX = nextX; ball.targetY = nextY;
                playLoudSwipeSound();

                let animationVelocity = 0.35;
                function animate() {
                    let arrived = true;
                    if (ball.renderX !== ball.targetX) {
                        let diff = ball.targetX - ball.renderX;
                        if (Math.abs(diff) <= animationVelocity) ball.renderX = ball.targetX;
                        else ball.renderX += Math.sign(diff) * animationVelocity;
                        arrived = false;
                    }
                    if (ball.renderY !== ball.targetY) {
                        let diff = ball.targetY - ball.renderY;
                        if (Math.abs(diff) <= animationVelocity) ball.renderY = ball.targetY;
                        else ball.renderY += Math.sign(diff) * animationVelocity;
                        arrived = false;
                    }
                    draw();
                    if (arrived) {
                        ball.x = ball.targetX; ball.y = ball.targetY;
                        ball.isMoving = false;
                        checkWinCondition();
                    } else requestAnimationFrame(animate);
                }
                animate();
            }
        }

        // --- PERFECT PATHFINDING HINT DISPATCHER ---
        function triggerHintArrow() {
            if (ball.isMoving) return;
            const checks = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
            
            // Priority 1: Unpainted blocks direction
            for (let d of checks) {
                let cx = ball.x + d.dx; let cy = ball.y + d.dy;
                if (cy >= 0 && cy < rows && cx >= 0 && cx < cols && grid[cy][cx] === 0) {
                    activeHintDir = d; draw(); return;
                }
            }
            // Priority 2: Safe bounce pivot direction
            for (let d of checks) {
                let cx = ball.x + d.dx; let cy = ball.y + d.dy;
                if (cy >= 0 && cy < rows && cx >= 0 && cx < cols && grid[cy][cx] === 2) {
                    activeHintDir = d; draw(); return;
                }
            }
        }

        function checkWinCondition() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 0) return;
                }
            }
            const popup = document.getElementById('popup-msg');
            popup.innerText = winMessages[Math.floor(Math.random() * winMessages.length)];
            popup.classList.add('show');
            setTimeout(() => {
                popup.classList.remove('show');
                currentLevel++;
                
                localStorage.setItem('stardust_lvl', currentLevel);
                localStorage.setItem('stardust_diff', currentDifficulty);
                
                pickRandomColor();
                generateValidMaze();
            }, 1100);
        }

        function handleSwipe(diffX, diffY) {
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30) moveBall(1, 0); else if (diffX < -30) moveBall(-1, 0);
            } else {
                if (diffY > 30) moveBall(0, 1); else if (diffY < -30) moveBall(0, -1);
            }
        }

        window.addEventListener('mousedown', e => { touchStartX = e.clientX; touchStartY = e.clientY; });
        window.addEventListener('mouseup', e => { handleSwipe(e.clientX - touchStartX, e.clientY - touchStartY); });
        window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => { handleSwipe(e.changedTouches[0].clientX - touchStartX, e.changedTouches[0].clientY - touchStartY); });

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') moveBall(0, -1);
            if (e.key === 'ArrowDown' || e.key === 's') moveBall(0, 1);
            if (e.key === 'ArrowLeft' || e.key === 'a') moveBall(-1, 0);
            if (e.key === 'ArrowRight' || e.key === 'd') moveBall(1, 0);
        });
    </script>
</body>
</html>
